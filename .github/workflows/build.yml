name: Build

on:
  pull_request:
    branches: [ "**" ]
  release:
    types: [ published ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Setup JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'microsoft'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build mod
        run: ./gradlew build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.repository.name }}-${{ github.sha }}
          path: |
            build/libs/*.jar
            !build/libs/*-dev.jar
          if-no-files-found: error

      - name: Generate changelog
        if: github.event_name == 'release'
        uses: orhun/git-cliff-action@v4
        id: changelog
        with:
          config: cliff.toml
          args: --latest --strip header

      - name: Upload JARs to Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.changelog.outputs.content }}
          files: |
            build/libs/*.jar
            !build/libs/*-dev.jar

  build-sync:
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    permissions:
      contents: write
    steps:
      - name: Checkout main-sync branch
        uses: actions/checkout@v4
        with:
          ref: main-sync
          fetch-depth: 0

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Setup JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'microsoft'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Sync version with release tag
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          sed -i "s/^mod_version=.*/mod_version=${VERSION}/" gradle.properties
          echo "Building sync variant at version ${VERSION}"

      - name: Build sync mod
        run: ./gradlew build

      - name: Rename sync JARs
        run: |
          cd build/libs
          for f in *.jar; do
            case "$f" in
              *-dev.jar|*-sources.jar) ;;
              *) mv "$f" "${f%.jar}-sync.jar" ;;
            esac
          done

      - name: Upload sync JARs to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/libs/*-sync.jar
