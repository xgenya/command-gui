name: Sync Wiki

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - ".github/wiki/**"

jobs:
  wiki:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Push wiki content
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          WIKI_URL="https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.wiki.git"

          if git clone "$WIKI_URL" wiki-repo 2>/dev/null; then
            cd wiki-repo
          else
            mkdir wiki-repo && cd wiki-repo
            git init
            git remote add origin "$WIKI_URL"
          fi

          cp ../.github/wiki/*.md .
          git add .
          git diff --staged --quiet || git commit -m "docs: sync wiki from .github/wiki/"
          git push origin HEAD:master --force
