changelog:
  exclude:
    labels:
      - ignore-for-release
  categories:
    - title: 🚀 新功能
      labels:
        - feat
        - feature
        - enhancement
    - title: 🐛 Bug 修复
      labels:
        - fix
        - bug
    - title: 📦 依赖更新
      labels:
        - dependencies
        - deps
    - title: 🔧 其他改动
      labels:
        - "*"
